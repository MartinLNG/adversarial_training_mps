# @package _global_
experiment: dev_comb

defaults:
  - override /born: fourier/d10D6
  - override /dataset: 2Dtoy/circles_4k
  - override /trainer/classification: adam500_loss
  - override /trainer/generative: default
  - override /trainer/ganstyle: null
  - override /trainer/adversarial: null
  - override /tracking: online

tracking:
  seed: 42
dataset:
  split_seed: 11
  gen_dow_kwargs:
    seed: 25

trainer:
  classification:
    max_epoch: ???
    batch_size: 256
    patience: 100
    stop_crit: "clsloss"
    watch_freq: 0
    save: false
    optimizer:
      name: "adam"
      kwargs:
        lr: 0.03064541878614421
        weight_decay: 1.9367978152708782e-06
    criterion:
      name: "negative log-likelihood"
      kwargs:
        eps: 1e-8
    metrics: {"clsloss": 1, "acc": 1, "genloss": 1, "fid": 10}

  generative:
    max_epoch: ${complement_100:${trainer.classification.max_epoch}}
    batch_size: 256
    patience: 100
    stop_crit: "genloss"
    watch_freq: 0
    save: true
    optimizer:
      name: "adam"
      kwargs:
        lr: 0.009454306819536176
        weight_decay: 6.155564318973005e-05
    criterion:
      name: "nll"
      kwargs:
        eps: 1e-8
    metrics: {"genloss": 1, "acc": 1, "clsloss": 1, "fid": 10}

hydra:
  sweeper:
    params:
      trainer.classification.max_epoch: range(0,101,10)
      tracking.seed: range(1,6)
