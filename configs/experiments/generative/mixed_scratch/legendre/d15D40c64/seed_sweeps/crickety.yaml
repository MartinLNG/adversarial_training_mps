# @package _global_
experiment: seed_sweep
descriptor: mixed_scratch

defaults:
  - override /born: legendre/d15D40c64
  - override /dataset: ucr_ts/crickety
  - override /trainer/classification: null
  - override /trainer/ganstyle: null
  - override /trainer/adversarial: null
  - override /tracking: online

tracking:
  seed: 42

trainer:
  generative:
    max_epoch: 1000
    batch_size: 128
    patience: 300
    stop_crit: "acc"
    watch_freq: 0
    save: true
    norm_control:
      target: 1.0
      hard_every: 0
      soft_strength: 0.0
    optimizer:
      name: "adam"
      kwargs:
        lr: ???           # FILL FROM GRID SWEEP
        weight_decay: 0.0
    criterion:
      name: "mixed_nll"
      kwargs: {eps: 1e-8, alpha: ???}  # FILL FROM GRID SWEEP
    metrics: {"genloss": 1, "acc": 1}

hydra:
  sweep:
    dir: outputs/seed_sweep/gen/legendre/d15D40c64/${dataset.name}_${now:%d%m}
    subdir: ${hydra.job.num}
  sweeper:
    params:
      tracking.seed: range(1, 4)
