# @package _global_
experiment: hpo
descriptor: nll_pretrained

defaults:
  - override /born: legendre/d3D10c64
  - override /dataset: ucr_ts/italypowerdemand
  - override /trainer/classification: null       # loaded, not retrained
  - override /trainer/ganstyle: null
  - override /trainer/adversarial: null
  - override /tracking: online
  - override /hydra/sweeper: optuna

model_path: outputs/seed_sweep/cls/legendre/d3D10c64/italypowerdemand_1503/0/models/cls

tracking:
  seed: 42

trainer:
  generative:
    max_epoch: 1000
    batch_size: 128
    patience: 200
    stop_crit: "genloss"
    watch_freq: 0
    save: false
    optimizer:
      name: "adam"
      kwargs:
        lr: 1e-4
        weight_decay: 0.0
    criterion:
      name: "nll"
      kwargs: {eps: 1e-8}
    metrics: {"genloss": 1, "acc": 1}

hydra:
  sweeper:
    study_name: "hpo_pretrained_${dataset.name}"
    sampler:
      _target_: optuna.samplers.TPESampler
      seed: 42
      n_startup_trials: 5
    direction: minimize
    n_trials: 20
    n_jobs: 1
    params:
      trainer.generative.optimizer.kwargs.lr: tag(log, interval(1e-5, 1e-2))
      trainer.generative.optimizer.kwargs.weight_decay: tag(log, interval(1e-9, 1e-1))
