# @package _global_
experiment: hpo

descriptor: nll
defaults:
  - override /born: legendre/d3D10
  - override /dataset: ucr_ts/syntheticcontrol
  - override /trainer/ganstyle: null
  - override /trainer/adversarial: null
  - override /tracking: online
  - override /hydra/sweeper: optuna

tracking:
  seed: 42

trainer:
  classification:               # warm-start before generative training
    max_epoch: 300
    batch_size: 128
    patience: 100
    stop_crit: "acc"
    watch_freq: 0
    save: false
    optimizer:
      name: "adam"
      kwargs:
        lr: 1e-4
        weight_decay: 0.0
    criterion:
      name: "negative log-likelihood"
      kwargs:
        eps: 1e-6
    metrics: {"clsloss": 1, "acc": 1}
  generative:
    max_epoch: 500
    batch_size: 128
    patience: 200
    stop_crit: "genloss"
    watch_freq: 0
    save: false
    optimizer:
      name: "adam"
      kwargs:
        lr: 1e-4
        weight_decay: 0.0
    criterion:
      name: "nll"
      kwargs:
        eps: 1e-8
    metrics: {"genloss": 1, "acc": 1}

hydra:
  sweeper:
    study_name: "${experiment}_${dataset.name}"
    sampler:
      _target_: optuna.samplers.TPESampler
      seed: 42
      n_startup_trials: 10
    direction: minimize
    n_trials: 50
    n_jobs: 1
    params:
      trainer.generative.optimizer.kwargs.lr: tag(log, interval(1e-5, 1e-2))
      trainer.generative.optimizer.kwargs.weight_decay: tag(log, interval(1e-9, 1e-1))
