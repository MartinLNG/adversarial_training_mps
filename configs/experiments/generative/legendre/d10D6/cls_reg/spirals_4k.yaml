# @package _global_
experiment: cls_reg

defaults:
  - override /born: legendre/d10D6
  - override /dataset: 2Dtoy/spirals_4k
  - override /trainer/classification: null
  - override /trainer/generative: test
  - override /trainer/ganstyle: null
  - override /trainer/adversarial: null
  - override /tracking: online

model_path: outputs/seed_sweep/cls/legendre/d10D6/spirals_4k_DDMM/2/models/<checkpoint>  # FILL: run fill_hpo.py after d10D6 cls seed_sweep

dataset:
  split_seed: 11
  gen_dow_kwargs:
    seed: 25

tracking:
  seed: 42

trainer:
  generative:
    max_epoch: 1            # placeholder; swept via hydra sweeper
    batch_size: 256
    patience: 100           # >= max max_epoch -> no early stopping during sweep
    stop_crit: "genloss"
    watch_freq: 0
    save: true
    optimizer:
      name: "adam"
      kwargs:
        lr: ???              # FILL FROM HPO (gen)
        weight_decay: ???    # FILL FROM HPO (gen)
    criterion:
      name: "nll"
      kwargs:
        eps: 1e-8
    metrics: {"genloss": 1, "acc": 1, "rob": 1}

hydra:
  sweeper:
    params:
      trainer.generative.max_epoch: choice(1,2,4,8,16,32,64,128)
      tracking.seed: range(1,6)
