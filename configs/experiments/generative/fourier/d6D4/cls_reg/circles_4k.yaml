# @package _global_
experiment: cls_reg

defaults:
  - override /born: fourier/d6D4
  - override /dataset: 2Dtoy/circles_4k
  - override /trainer/classification: null
  - override /trainer/generative: test
  - override /trainer/ganstyle: null
  - override /trainer/adversarial: null
  - override /tracking: online

model_path: outputs/seed_sweep/cls/fourier/d10D6/circles_4k_2102/2/models/circles_4k_pre_mps_bd6_fourier10_300adamlr0.03064541878614421wd1.9367978152708782e-06  # FILL: relative path to pretrained classifier checkpoint

dataset:
  split_seed: 11
  gen_dow_kwargs:
    seed: 25

tracking:
  seed: 42

trainer:
  generative:
    max_epoch: 1            # placeholder; swept via hydra sweeper
    batch_size: 256
    patience: 100           # >= max max_epoch -> no early stopping during sweep
    stop_crit: "genloss"
    watch_freq: 0
    save: true
    optimizer:
      name: "adam"
      kwargs:
        lr: 0.0009523250729655188
        weight_decay: 0.00015777381369694665
    criterion:
      name: "nll"
      kwargs:
        eps: 1e-8
    metrics: {"genloss": 1, "acc": 1, "rob": 1}

hydra:
  sweeper:
    params:
      trainer.generative.max_epoch: choice(1,5,10,50,100)
      tracking.seed: range(1,6)
