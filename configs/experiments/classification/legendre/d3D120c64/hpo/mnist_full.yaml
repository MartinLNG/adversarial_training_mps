# @package _global_
experiment: hpo
descriptor: cls

defaults:
  - override /born: legendre/d3D120c64
  - override /dataset: mnist/mnist_full
  - override /trainer/generative: null
  - override /trainer/ganstyle: null
  - override /trainer/adversarial: null
  - override /tracking: online
  - override /hydra/sweeper: optuna

tracking:
  seed: 42

trainer:
  classification:
    max_epoch: 150
    batch_size: 16
    patience: 50
    stop_crit: "acc"
    watch_freq: 0
    save: false
    optimizer:
      name: "adam"
      kwargs:
        lr: 1e-4
        weight_decay: 0.0
    criterion:
      name: "negative log-likelihood"
      kwargs:
        eps: 1e-6
    metrics: {"clsloss": 1, "acc": 1}

hydra:
  sweeper:
    study_name: "${experiment}_${dataset.name}"
    sampler:
      _target_: optuna.samplers.TPESampler
      seed: 42
      n_startup_trials: 5
    direction: minimize
    n_trials: 20
    n_jobs: 1
    params:
      trainer.classification.optimizer.kwargs.lr: tag(log, interval(1e-4, 5e-2))
