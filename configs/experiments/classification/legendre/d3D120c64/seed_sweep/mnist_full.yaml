# @package _global_
experiment: seed_sweep
descriptor: cls

defaults:
  - override /born: legendre/d3D120c64
  - override /dataset: mnist/mnist_full
  - override /trainer/generative: null
  - override /trainer/ganstyle: null
  - override /trainer/adversarial: null
  - override /tracking: online

tracking:
  seed: 42

trainer:
  classification:
    max_epoch: 150
    batch_size: 16
    patience: 50
    stop_crit: "acc"
    watch_freq: 0
    save: true
    optimizer:
      name: "adam"
      kwargs:
        lr: ???  # FILL FROM HPO
        weight_decay: 0.0
    criterion:
      name: "negative log-likelihood"
      kwargs:
        eps: 1e-6
    metrics: {"clsloss": 1, "acc": 1}

hydra:
  sweep:
    dir: outputs/seed_sweep/cls/legendre/d3D120c64/mnist_full_${now:%d%m}
    subdir: ${hydra.job.num}
  sweeper:
    params:
      tracking.seed: range(1, 6)
