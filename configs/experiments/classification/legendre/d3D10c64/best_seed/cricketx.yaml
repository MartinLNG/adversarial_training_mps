# @package _global_
experiment: best_seed

defaults:
  - override /born: legendre/d3D10c64
  - override /dataset: ucr_ts/cricketx
  - override /trainer/ganstyle: null
  - override /trainer/adversarial: null
  - override /tracking: online

tracking:
  seed: ???  # FILL: best seed from wandb

trainer:
  classification:
    max_epoch: 800
    batch_size: 100
    patience: 300
    stop_crit: "acc"
    watch_freq: 0
    save: true
    optimizer:
      name: "adam"
      kwargs:
        lr: 9.935765726949015e-05
        weight_decay: 7.896552638359285e-10
    criterion:
      name: "negative log-likelihood"
      kwargs:
        eps: 1e-6
    metrics: {"clsloss": 1, "acc": 1}
