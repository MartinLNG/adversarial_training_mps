# @package _global_
experiment: best_seed

defaults:
  - override /born: legendre/d3D10c64
  - override /dataset: ucr_ts/italypowerdemand
  - override /trainer/ganstyle: null
  - override /trainer/adversarial: null
  - override /tracking: online

tracking:
  seed: 4  # FILL: best seed from wandb

trainer:
  classification:
    max_epoch: 800
    batch_size: 100
    patience: 300
    stop_crit: "acc"
    watch_freq: 0
    save: true
    optimizer:
      name: "adam"
      kwargs:
        lr: 0.0001329291894316216
        weight_decay: 0.00025619560600751486
    criterion:
      name: "negative log-likelihood"
      kwargs:
        eps: 1e-6
    metrics: {"clsloss": 1, "acc": 1}
