# @package _global_
experiment: hpo_brier
descriptor: brier
defaults:
  - override /born: legendre/d3D21
  - override /dataset: mnist/mnist_full
  - override /trainer/ganstyle: null
  - override /trainer/adversarial: null
  - override /tracking: online
  - override /hydra/sweeper: optuna

tracking:
  seed: 42

trainer:
  classification:
    max_epoch: 300
    batch_size: 512
    patience: 60
    stop_crit: "acc"
    watch_freq: 0
    auto_stack: True
    auto_unbind: False
    save: false
    optimizer:
      name: "adam"
      kwargs:
        lr: 1e-4
        weight_decay: 0.0
    criterion:
      name: "brier"
      kwargs: null
    metrics: {"clsloss": 1, "acc": 1}

hydra:
  sweeper:
    study_name: "${experiment}_${dataset.name}_brier"
    sampler:
      _target_: optuna.samplers.TPESampler
      seed: 42
      n_startup_trials: 10
    direction: minimize
    n_trials: 50
    n_jobs: 1
    params:
      trainer.classification.optimizer.kwargs.lr: tag(log, interval(1e-5, 5e-3))
      trainer.classification.optimizer.kwargs.weight_decay: tag(log, interval(1e-15, 1e-3))
