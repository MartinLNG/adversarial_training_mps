# @package _global_
experiment: test

defaults:
  - override /born: fourier/d3D10
  - override /dataset: mnist/mnist_1k
  - override /trainer/ganstyle: null
  - override /trainer/adversarial: null
  - override /tracking: test

tracking:
  seed: 42

trainer:
  classification:
    max_epoch: 10
    batch_size: 256
    patience: 10
    stop_crit: "acc"
    watch_freq: 0
    save: false
    optimizer:
      name: "adam"
      kwargs:
        lr: 1e-4
        weight_decay: 0.0
    criterion:
      name: "negative log-likelihood"
      kwargs:
        eps: 1e-8
    metrics: {"clsloss": 1, "acc": 1}
