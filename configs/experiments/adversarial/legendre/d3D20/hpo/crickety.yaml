# @package _global_
experiment: hpo

defaults:
  - override /born: legendre/d3D20
  - override /dataset: ucr_ts/crickety
  - override /trainer/classification: null
  - override /trainer/adversarial: pgd_at
  - override /trainer/ganstyle: null
  - override /trainer/generative: null
  - override /tracking: online
  - override /hydra/sweeper: optuna

model_path: ???   # fill after classification seed_sweep

tracking:
  seed: 42
  evasion:
    method: PGD
    norm: 2
    criterion:
      name: negative log-likelihood
      kwargs:
        eps: 1.0e-08
    strengths: [0.15]

trainer:
  adversarial:
    max_epoch: 300
    batch_size: 128
    method: "pgd_at"
    stop_crit: "rob"
    patience: 300
    watch_freq: 0
    metrics: {"rob": 1, "acc": 1}
    evasion:
      method: "PGD"
      norm: 2
      criterion:
        name: "negative log-likelihood"
        kwargs:
          eps: 1e-8
      strengths: [0.15]
      num_steps: 10
      step_size: null
      random_start: true
    curriculum: true
    curriculum_start: 0.01
    curriculum_end_epoch: 200
    save: false
    auto_stack: true
    auto_unbind: false

hydra:
  sweeper:
    study_name: "${experiment}_${dataset.name}"
    sampler:
      _target_: optuna.samplers.TPESampler
      seed: 42
      n_startup_trials: 10
    direction: minimize
    n_trials: 50
    n_jobs: 1
    params:
      trainer.adversarial.optimizer.kwargs.lr: tag(log, interval(1e-5, 1e-2))
      trainer.adversarial.optimizer.kwargs.weight_decay: tag(log, interval(1e-9, 1e-1))
      trainer.adversarial.clean_weight: interval(0.0, 0.95)
