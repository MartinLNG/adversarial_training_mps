# @package _global_
experiment: cls_reg

defaults:
  - override /born: legendre/d10D6
  - override /dataset: 2Dtoy/circles_4k
  - override /trainer/classification: null
  - override /trainer/adversarial: pgd_at
  - override /trainer/ganstyle: null
  - override /trainer/generative: null
  - override /tracking: online

model_path: outputs/seed_sweep/cls/legendre/d10D6/circles_4k_DDMM/2/models/<checkpoint>  # FILL: run fill_hpo.py after d10D6 cls seed_sweep

dataset:
  split_seed: 11
  gen_dow_kwargs:
    seed: 25

tracking:
  seed: 42
  evasion:
    method: "PGD"
    norm: 2
    criterion:
      name: "negative log-likelihood"
      kwargs: {eps: 1e-8}
    strengths: [0.1]   # 5% of input range (legendre: [-1,1]); weaker than full adv training (0.15)
    num_steps: 10
    step_size: null
    random_start: true

trainer:
  adversarial:
    max_epoch: 1            # placeholder; swept via hydra sweeper
    batch_size: 256
    method: "pgd_at"
    stop_crit: "rob"
    patience: 100           # >= max max_epoch -> no early stopping during sweep
    watch_freq: 0
    metrics: {"rob": 1, "clsloss": 1, "acc": 1}

    evasion:
      method: "PGD"
      norm: 2
      criterion:
        name: "negative log-likelihood"
        kwargs: {eps: 1e-8}
      strengths: [0.1]   # 5% of input range (legendre: [-1,1])
      num_steps: 10
      step_size: null
      random_start: true

    curriculum: false
    curriculum_start: 0.0
    curriculum_end_epoch: null
    clean_weight: ???        # FILL FROM HPO (adv)
    save: true
    auto_stack: true
    auto_unbind: false

    optimizer:
      name: "adam"
      kwargs:
        lr: ???              # FILL FROM HPO (adv or gen)
        weight_decay: ???    # FILL FROM HPO (adv or gen)

hydra:
  sweeper:
    params:
      trainer.adversarial.max_epoch: choice(1,2,4,8,16,32,64,128)
      tracking.seed: range(1,6)
