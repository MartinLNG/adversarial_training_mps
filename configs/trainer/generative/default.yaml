max_epoch: 100
batch_size: 256
optimizer:
  name: "adam"
  kwargs:
    lr: 1e-4
    weight_decay: 0.00
criterion:
  name: "nll"
  kwargs:
    eps: 1e-8
patience: 50
stop_crit: "acc"
watch_freq: 0
norm_control:
  target: 1.0        # null = pretrained Z; float = explicit; str = expression e.g. "n_features"
  hard_every: 1      # hard renorm every N steps; 0 = disabled
  soft_strength: 0.0 # soft penalty coefficient; 0.0 = disabled
metrics: {"genloss": 1, "acc": 1, "fid": 10, "viz": 10}
save: false
auto_stack: true
auto_unbind: false
